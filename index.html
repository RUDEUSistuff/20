<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Smart Calculator Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:10px;font-family:'Segoe UI',Arial,sans-serif;background:radial-gradient(ellipse at center,#0a0f2a 0%,#03050b 100%);color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center;flex-direction:column;overflow-x:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:moveUp linear infinite}
@keyframes moveUp{0%{transform:translateY(100vh)}100%{transform:translateY(-20vh)}}
.container{max-width:400px;width:90%;margin:auto;position:relative;z-index:1}
.hidden{display:none}
button,.btn,.menu-btn{padding:12px 22px;margin:6px;border-radius:12px;color:white;background:rgba(255,182,193,0.8);cursor:pointer;transition:0.2s;font-size:14px}
button:hover,.btn:hover,.menu-btn:hover{transform:scale(1.05);background:rgba(255,182,193,1)}
input{padding:12px;width:80%;border-radius:12px;text-align:center;margin:10px;font-size:14px}
.result,.explain{margin:8px;font-size:14px}
</style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="container">

<!-- Welcome -->
<div id="welcome">
<h1>AI Smart Calculator Hub</h1>
<p>Enter exactly 2 numbers to start</p>
<input id="numCheck" placeholder="Enter 2 numbers separated by comma">
<button id="startBtn">Start</button>
</div>

<!-- Menu -->
<div id="menu" class="hidden">
<h2>Select</h2>
<button onclick="showPage('math')">Math</button>
<button onclick="showPage('physics')">Physics</button>
<button onclick="showPage('puzzle')">Puzzle</button>
<button onclick="showPage('ai3d')">3D & AI</button>
</div>

<!-- Math -->
<div id="math" class="hidden">
<h2>Math</h2>
<input id="mathInput" placeholder="Enter operation...">
<div>
<button onclick="addMath('+')">+</button>
<button onclick="addMath('-')">-</button>
<button onclick="addMath('*')">×</button>
<button onclick="addMath('/')">÷</button>
<button onclick="addMath('**')">^</button>
<button onclick="addMath('%')">%</button>
<button onclick="addMath('Math.sqrt(')">√</button>
<button onclick="addMath('Math.PI')">π</button>
<button onclick="addMath('Math.E')">e</button>
<button onclick="addMath('Math.sin(')">sin</button>
<button onclick="addMath('Math.cos(')">cos</button>
<button onclick="addMath('Math.tan(')">tan</button>
<button onclick="addMath('Math.log(')">log</button>
<button onclick="addMath('Math.abs(')">abs</button>
</div>
<div>
<button onclick="clearMath()">Clear</button>
<button onclick="calculateMath()">Calculate</button>
</div>
<div class="result-box">
<div class="result" id="mathRes">Result: ---</div>
<div class="explain" id="mathExplain">Explanation: ---</div>
</div>
<button onclick="showPage('menu')">Back</button>
</div>

<!-- Physics -->
<div id="physics" class="hidden">
<h2>Physics Laws</h2>
<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center">
<button onclick="showPhysicsPopup('Force')">Force (F=ma)</button>
<button onclick="showPhysicsPopup('Pressure')">Pressure (P=F/A)</button>
<button onclick="showPhysicsPopup('Kinetic Energy')">Kinetic Energy</button>
<button onclick="showPhysicsPopup('Potential Energy')">Potential Energy</button>
<button onclick="showPhysicsPopup('Newton Gravity')">Newton Gravity</button>
<button onclick="showPhysicsPopup('Ohm Law')">Ohm Law</button>
<button onclick="showPhysicsPopup('Work')">Work</button>
<button onclick="showPhysicsPopup('Power')">Power</button>
<button onclick="showPhysicsPopup('Density')">Density</button>
<button onclick="showPhysicsPopup('Momentum')">Momentum</button>
<button onclick="showPhysicsPopup('Acceleration')">Acceleration</button>
<button onclick="showPhysicsPopup('Velocity')">Velocity</button>
<button onclick="showPhysicsPopup('Hooke Law')">Hooke Law</button>
<button onclick="showPhysicsPopup('Einstein E')">E=mc²</button>
<button onclick="showPhysicsPopup('Coulomb Law')">Coulomb Law</button>
<button onclick="showPhysicsPopup('Wave Speed')">Wave Speed</button>
<button onclick="showPhysicsPopup('Resistivity')">Resistivity</button>
</div>
<button onclick="showPage('menu')">Back</button>
</div>

<!-- Puzzle -->
<div id="puzzle" class="hidden">
<h2>Puzzle Game</h2>
<div id="puzzleQuestion">Select level to start</div>
<div id="puzzleOptions"></div>
<button onclick="startPuzzle()">Start Game</button>
<button onclick="nextPuzzle()">Next</button>
<div id="puzzleScore">Score: 0</div>
<button onclick="showPage('menu')">Back</button>
</div>

<!-- 3D & AI -->
<div id="ai3d" class="hidden">
<h2>3D & AI Calculator</h2>
<input id="aiInput" placeholder="cube 3 or sphere 5">
<button onclick="solveAI()">Solve</button>
<div id="aiRes" class="result">Result: ---</div>
<div id="aiExplain" class="explain">Explanation: ---</div>
<button onclick="showPage('menu')">Back</button>
</div>

</div>

<script>
// stars
for(let i=0;i<30;i++){
  let s=document.createElement('div');
  s.className='star';
  s.style.width='2px';
  s.style.height='2px';
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(Math.random()*5+5)+'s';
  document.getElementById('starsContainer').appendChild(s);
}

// navigation
function showPage(p){
  ['menu','math','physics','puzzle','ai3d','welcome'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(p).classList.remove('hidden');
}

// start button with number check
document.getElementById('startBtn').onclick=()=>{
  let val = document.getElementById('numCheck').value.split(',');
  if(val.length!==2 || val.some(v=>isNaN(v))){
    alert("Please enter exactly 2 numbers separated by comma!");
    return;
  }
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
};

// Math functions
function addMath(op){document.getElementById('mathInput').value+=op}
function clearMath(){document.getElementById('mathInput').value='';document.getElementById('mathRes').innerHTML="Result: ---";document.getElementById('mathExplain').innerHTML="Explanation: ---";}
function calculateMath(){
  let input=document.getElementById('mathInput').value;
  try{
    let res=eval(input);
    document.getElementById('mathRes').innerHTML="Result: "+res;
    document.getElementById('mathExplain').innerHTML=input+" = "+res;
  }catch{
    document.getElementById('mathRes').innerHTML="Error";
    document.getElementById('mathExplain').innerHTML="Check your input";
  }
}

// Physics popup
function showPhysicsPopup(law){
  let formulas={
    'Force':'F = m × a',
    'Pressure':'P = F / A',
    'Kinetic Energy':'KE = 0.5 × m × v²',
    'Potential Energy':'PE = m × g × h',
    'Newton Gravity':'F = G × m₁ × m₂ / r²',
    'Ohm Law':'V = I × R',
    'Work':'W = F × d',
    'Power':'P = W / t',
    'Density':'ρ = m / V',
    'Momentum':'p = m × v',
    'Acceleration':'a = Δv / t',
    'Velocity':'v = Δx / t',
    'Hooke Law':'F = k × x',
    'Einstein E':'E = mc²',
    'Coulomb Law':'F = k × q₁ × q₂ / r²',
    'Wave Speed':'v = f × λ',
    'Resistivity':'R = ρ × L / A'
  };
  alert(formulas[law]);
}

// AI 3D
function solveAI(){
  let input=document.getElementById('aiInput').value.toLowerCase();
  try{
    if(input.includes('cube')){
      let n=parseFloat(input.match(/\d+/));
      let volume = n*n*n;
      let surface = 6*n*n;
      let perimeter = 12*n;
      document.getElementById('aiRes').innerHTML=`Volume: ${volume} | Surface Area: ${surface} | Perimeter: ${perimeter}`;
      document.getElementById('aiExplain').innerHTML=`Volume = ${n}³ = ${volume} <br> Surface Area = 6×${n}² = ${surface} <br> Perimeter = 12×${n} = ${perimeter}`;
    } else if(input.includes('sphere')){
      let r=parseFloat(input.match(/\d+/));
      let volume=(4/3)*Math.PI*r*r*r;
      let surface=4*Math.PI*r*r;
      volume=volume.toFixed(2);
      surface=surface.toFixed(2);
      document.getElementById('aiRes').innerHTML=`Volume: ${volume} | Surface Area: ${surface}`;
      document.getElementById('aiExplain').innerHTML=`Volume = 4/3 π r³ = ${volume} <br> Surface Area = 4 π r² = ${surface}`;
    } else {
      let res=eval(input);
      document.getElementById('aiRes').innerHTML="Result: "+res;
      document.getElementById('aiExplain').innerHTML=input+" = "+res;
    }
  }catch{
    document.getElementById('aiRes').innerHTML="Error";
    document.getElementById('aiExplain').innerHTML="Try: cube 3 or sphere 5";
  }
}
</script>
</body>
</html>
